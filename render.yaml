# Render Blueprint — https://render.com/docs/blueprint-spec
# Provisions Redis-compatible Key Value and wires REDIS_URL automatically.
# After apply: open the Web Service URL (or rely on RENDER_EXTERNAL_URL for PUBLIC_BASE_URL).

services:
  - type: keyvalue
    name: greenfield-keyvalue
    region: oregon
    plan: starter
    ipAllowList: []

  - type: web
    name: greenfield-vendor-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build -w apps/server
    startCommand: npm run start -w apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: none
      - key: REDIS_URL
        fromService:
          name: greenfield-keyvalue
          type: keyvalue
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_BEDROCK_MODEL_ID
        sync: false

# Render Blueprint — https://render.com/docs/blueprint-spec
# Provisions Redis-compatible Key Value and wires REDIS_URL automatically.
# PUBLIC_BASE_URL: omit in Render; server uses RENDER_EXTERNAL_URL when unset.
#
# Optional integrations (Nexla, Ghost, TigerData, payment stubs, web discovery, LLM)
# are not listed here — add them in the Render dashboard when you need them (see README).

services:
  - type: keyvalue
    name: greenfield-keyvalue
    region: oregon
    plan: starter
    ipAllowList: []

  - type: web
    name: greenfield-vendor-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    # Service env sets NODE_ENV=production, which makes npm ci omit devDependencies — vite must be installed to build the UI.
    buildCommand: NPM_CONFIG_PRODUCTION=false NODE_ENV=development npm ci && npm run build -w apps/server && npm run build -w apps/web
    startCommand: npm run start -w apps/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATIC_WEB_ROOT
        value: apps/web/dist
      - key: LLM_PROVIDER
        value: none
      - key: REDIS_URL
        fromService:
          name: greenfield-keyvalue
          type: keyvalue
          property: connectionString
